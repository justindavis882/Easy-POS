<div id="profile-applet" class="applet-container">
    <header class="profile-header">
        <div class="avatar-circle" id="user-initials">OD</div>
        <div class="user-details">
            <h2 id="user-name">Olly Davis</h2>
            <span class="role-badge" id="user-role">Admin</span>
        </div>
        <button id="close-profile-btn" class="icon-btn">✕</button>
    </header>

    <main class="profile-body">
        <div class="shift-status-card">
            <h3>Current Shift Status</h3>
            <p id="shift-status-text" class="status-out">Currently Clocked Out</p>
            <p class="hours-today">Hours Today: <span id="hours-count">0.00</span></p>
        </div>

        <button id="time-clock-toggle" class="clock-btn btn-clock-in">
            CLOCK IN
        </button>
    </main>
</div>
