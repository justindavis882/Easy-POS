<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>retroPOS - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo-container">
            <img src="your-logo.png" alt="Business Logo" id="business-logo">
        </div>

        <nav class="global-nav" id="global-nav">
            <button id="nav-home-btn" class="nav-btn">🏠 Home</button>
            <button id="nav-logout-btn" class="nav-btn">🔒 Log Out</button>
        </nav>

        <div style="text-align: right; color: white;">
            <div id="sys-date" style="font-size: 1rem; color: #aaa;"></div>
            <div id="sys-time" style="font-size: 2.5rem; font-weight: bold;"></div>
        </div>
    </header>
    
    <main class="applet-grid" id="applet-container">
        </main>

    <script src="app.js"></script>
</body>
</html>
