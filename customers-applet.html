<div id="customers-applet" class="applet-full-container" style="background-color: #1e1e1e;">
    <header class="register-header" style="background-color: #2a2a2a; border-bottom: 2px solid #333;">
        <h2>Customer Database</h2>
        <div>
            <button id="add-customer-btn" class="action-btn" style="background: #4CAF50; padding: 8px 15px; margin-right: 15px;">+ New Customer</button>
            <button id="close-customers-btn" class="nav-btn icon-btn">✕ Close</button>
        </div>
    </header>

    <main style="padding: 20px;">
        <div class="search-bar" style="margin-bottom: 20px;">
            <input type="text" id="customer-search-input" placeholder="Search by name, phone, or scan card..." style="width: 100%; padding: 15px; font-size: 1.2rem; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 8px;">
        </div>

        <table class="data-table" style="width: 100%;">
            <thead>
                <tr>
                    <th style="text-align: left;">Name</th>
                    <th style="text-align: left;">Phone</th>
                    <th style="text-align: left;">Loyalty Card</th>
                    <th style="text-align: right;">Loyalty Balance</th>
                    <th style="text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody id="customers-table-body">
                </tbody>
        </table>
    </main>

    <div id="customer-modal" class="modal-overlay hidden" style="z-index: 2000;">
        <div class="modal-content" style="max-width: 500px; background: #1e1e1e; border: 1px solid #444;">
            <h2 id="customer-modal-title" style="margin-top: 0; color: #4A90E2;">Add Customer</h2>
            <form id="customer-form" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="hidden" id="cust-id">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div><label>First Name</label><input type="text" id="cust-first" required style="width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #555;"></div>
                    <div><label>Last Name</label><input type="text" id="cust-last" required style="width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #555;"></div>
                </div>

                <div><label>Phone Number</label><input type="tel" id="cust-phone" required style="width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #555;"></div>
                <div><label>Email Address</label><input type="email" id="cust-email" style="width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #555;"></div>
                
                <div style="border: 1px solid #4A90E2; padding: 15px; border-radius: 8px; background: #121212;">
                    <label style="color: #4A90E2; font-weight: bold;">💳 Loyalty Card MSR / Barcode</label>
                    <input type="text" id="cust-card" placeholder="Swipe card or scan barcode here..." style="width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #555; margin-top: 5px;">
                    
                    <label style="margin-top: 15px; display: block; color: #FFD54F;">Current Balance ($)</label>
                    <input type="number" id="cust-balance" step="0.01" value="0.00" style="width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #555; margin-top: 5px; font-size: 1.2rem;">
                </div>

                <div class="modal-actions" style="margin-top: 10px; display: flex; gap: 10px;">
                    <button type="button" id="cancel-cust-btn" class="action-btn cancel-btn" style="flex: 1;">Cancel</button>
                    <button type="submit" class="action-btn save-btn" style="flex: 1;">Save Customer</button>
                </div>
            </form>
        </div>
    </div>
</div>
