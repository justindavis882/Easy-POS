<div id="login-applet" class="applet-full-container" style="justify-content: center; align-items: center; background-color: #121212;">
    <div style="text-align: center; max-width: 400px; width: 100%; background: #1e1e1e; padding: 40px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);">
        
        <h1 style="color: #4A90E2; font-size: 3rem; margin-bottom: 5px; margin-top: 0;">Easy POS</h1>
        <p id="login-status-msg" style="color: #888; margin-bottom: 30px; font-size: 1.2rem;">Enter PIN or Swipe Card</p>

        <div id="pin-display" style="font-size: 3rem; letter-spacing: 20px; height: 50px; margin-bottom: 20px; color: #FFD54F;"></div>

        <div class="pin-pad" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
            <button class="pin-btn">1</button>
            <button class="pin-btn">2</button>
            <button class="pin-btn">3</button>
            <button class="pin-btn">4</button>
            <button class="pin-btn">5</button>
            <button class="pin-btn">6</button>
            <button class="pin-btn">7</button>
            <button class="pin-btn">8</button>
            <button class="pin-btn">9</button>
            <button id="pin-clear" class="pin-btn" style="background-color: #E53935; color: white;">C</button>
            <button class="pin-btn">0</button>
            <button id="pin-enter" class="pin-btn" style="background-color: #4CAF50; color: white;">↵</button>
        </div>
    </div>
</div>
